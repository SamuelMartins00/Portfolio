<!DOCTYPE html>

<head>

<body class="bg-[#FFFFFF] text-black-300">

    <nav class="bg px-6 py-3 flex items-center justify-between">

                <img class="h-8 w-auto" href="index.html" src="foto" alt="logo">

            <div class="flex space-x-4">
                <a href="#pessoal"
                    class="text-black-300 hover:text-white px-3 py-2 rounded-md text-sm font-medium transition-colors">About me</a>
                <a href="#skills"
                    class="text-black-300 hover:text-white px-3 py-2 rounded-md text-sm font-medium transition-colors">Skills</a>
                <a href="#projects"

                <a href="#contact"

            </div>
        </div>

        <div class="relative w-full max-w-xs">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <svg class="h-5 w-5 text-black-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
            </div>
            <input type="text" placeholder="Search"
                class="block w-full bg border-transparent rounded-md py-2 pl-10 pr-3 text-sm text-black-300 placeholder-black-400 focus:outline-none focus:bg-white focus:text-gray-900 focus:ring-0 transition-all">
        </div>
    </nav>

    <section id="pessoal">
        <h1>Samuel Estevão Pereira Martins</h1>
        <p>Formação Academica</p>
    </section>

    <section id="skills">
        <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">

  <defs>

    <pattern id="gridPattern" width="40" height="40" patternUnits="userSpaceOnUse">

      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e5e7eb" stroke-width="1"/>

    </pattern>

    

    <radialGradient id="fadeGradient" cx="50%" cy="50%" r="60%" fx="50%" fy="50%">

      <stop offset="0%" stop-color="white" stop-opacity="1" />

      <stop offset="100%" stop-color="white" stop-opacity="0" />

    </radialGradient>

    

    <mask id="fadeMask">

      <rect width="100%" height="100%" fill="url(#fadeGradient)" />

    </mask>

  </defs>



  <rect width="100%" height="100%" fill="white" />

  

  <rect width="100%" height="100%" fill="url(#gridPattern)" mask="url(#fadeMask)" />

</svg>


        <h1>Hard Skill</h1>
        <h1>Soft Skill</h1>
    </section>

    <section id="projects">

    </section>
